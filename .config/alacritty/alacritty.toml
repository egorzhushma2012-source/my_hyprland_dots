# ~/.config/alacritty/alacritty.toml

# --- Шрифт ---
[font]
size = 12.0

normal = { family = "Monocraft", style = "Regular" }
bold = { family = "Monocraft", style = "Bold" }
italic = { family = "Monocraft", style = "Italic" }
bold_italic = { family = "Monocraft", style = "Bold Italic" }
#JetBrainsMono Nerd Font
# --- Тема Tokyo Night (Night) ---
[colors.primary]
background = "#1a1b26"
foreground = "#a9b1d6"

[colors.normal]
black   = "#32344a"
red     = "#f7768e"
green   = "#9ece6a"
yellow  = "#e0af68"
blue    = "#7aa2f7"
magenta = "#ad8ee6"
cyan    = "#449dab"
white   = "#787c99"

[colors.bright]
black   = "#444b6a"
red     = "#ff7a93"
green   = "#b9f27c"
yellow  = "#ff9e64"
blue    = "#7da6ff"
magenta = "#bb9af7"
cyan    = "#0db9d7"
white   = "#acb0d0"

[colors.selection]
background = "#283457"
foreground = "#a9b1d6"

# --- Окно (опционально) ---
[window]
padding = { x = 10, y = 10 }
dynamic_title = true   
